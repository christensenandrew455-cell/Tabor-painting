<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Tabor Painting logo">
  <defs>
    <clipPath id="badgeClip">
      <circle cx="256" cy="256" r="238"/>
    </clipPath>
    <linearGradient id="bristleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b2b4c"/>
      <stop offset="0.55" stop-color="#153a61"/>
      <stop offset="1" stop-color="#eef2f5"/>
    </linearGradient>
    <linearGradient id="metalGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a8f96"/>
      <stop offset="0.5" stop-color="#f4f4f4"/>
      <stop offset="1" stop-color="#9da3aa"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#061426" flood-opacity="0.18"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="246" fill="#ffffff"/>
  <circle cx="256" cy="256" r="239" fill="#ffffff" stroke="#f1f3f5" stroke-width="4"/>

  <g clip-path="url(#badgeClip)">
    <!-- Painterly circular brush stroke -->
    <path d="M128 360C70 288 85 178 162 113c67-56 166-60 238-13" fill="none" stroke="#082a4d" stroke-width="54" stroke-linecap="round"/>
    <path d="M129 360C87 308 83 225 122 164" fill="none" stroke="#143c64" stroke-width="42" stroke-linecap="round" opacity="0.9"/>
    <path d="M164 104c66-44 157-42 225 6" fill="none" stroke="#6f757b" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
    <path d="M150 122c56-38 136-44 207-10" fill="none" stroke="#0f3154" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <path d="M111 344c23 20 48 30 83 33" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    <path d="M93 294c23 22 58 34 104 39" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
    <path d="M94 260c29 25 73 39 130 41" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- House roof icon -->
  <g fill="none" stroke="#082a4d" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M171 230L254 153l90 77" stroke-width="15"/>
    <path d="M343 230V169h23v82" stroke-width="15"/>
    <path d="M207 230h98" stroke-width="15"/>
  </g>
  <g fill="#082a4d">
    <rect x="239" y="204" width="13" height="13"/>
    <rect x="258" y="204" width="13" height="13"/>
    <rect x="239" y="223" width="13" height="13"/>
    <rect x="258" y="223" width="13" height="13"/>
  </g>

  <!-- Main name -->
  <text x="256" y="304" text-anchor="middle" fill="#082a4d" font-family="Georgia, 'Times New Roman', serif" font-size="81" font-weight="700" letter-spacing="6">TABOR</text>

  <!-- Painting subtitle -->
  <line x1="116" y1="334" x2="169" y2="334" stroke="#082a4d" stroke-width="4" stroke-linecap="round"/>
  <line x1="343" y1="334" x2="396" y2="334" stroke="#082a4d" stroke-width="4" stroke-linecap="round"/>
  <text x="256" y="348" text-anchor="middle" fill="#6c7076" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" letter-spacing="13">PAINTING</text>

  <!-- Paint brush -->
  <g transform="translate(132 348) rotate(-8 155 45)" filter="url(#softShadow)">
    <path d="M0 60c34-2 73-7 111-25l20 60C86 101 45 93 0 78c18-4 24-9 0-18z" fill="url(#bristleGradient)"/>
    <path d="M107 31l57-14c13-3 26 5 30 18l8 29c4 13-4 26-17 30l-57 14z" fill="url(#metalGradient)" stroke="#7d838a" stroke-width="2"/>
    <path d="M125 27l21 76" stroke="#666d75" stroke-width="2" opacity="0.65"/>
    <path d="M145 22l21 76" stroke="#ffffff" stroke-width="3" opacity="0.75"/>
    <circle cx="157" cy="45" r="4" fill="#6f757d"/>
    <circle cx="164" cy="70" r="4" fill="#6f757d"/>
    <path d="M190 35c51-4 89-16 128-49 12-10 30 0 28 16-4 44-44 75-118 87-18 3-35-8-40-25z" fill="#082a4d" stroke="#061d36" stroke-width="3"/>
    <circle cx="318" cy="5" r="8" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
